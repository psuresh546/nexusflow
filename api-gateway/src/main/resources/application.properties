spring.application.name=api-gateway
server.port=8080

# metadata-service
spring.cloud.gateway.server.webmvc.routes[0].id=metadata-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/instances/**

# lifecycle-service
spring.cloud.gateway.server.webmvc.routes[1].id=lifecycle-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/lifecycle/**

# provisioning-service
spring.cloud.gateway.server.webmvc.routes[2].id=provisioning-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/provisioning/**

# credential-service
spring.cloud.gateway.server.webmvc.routes[3].id=credential-service
spring.cloud.gateway.server.webmvc.routes[3].uri=http://localhost:8084
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/credentials/**

# admin endpoints (metadata-service)
spring.cloud.gateway.server.webmvc.routes[4].id=admin-service
spring.cloud.gateway.server.webmvc.routes[4].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/admin/**

management.endpoints.web.exposure.include=health,info